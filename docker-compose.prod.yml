services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-Comptabli}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comptabli-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-Comptabli}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ocr-service:
    image: ${DOCKERHUB_USERNAME}/comptabli-ocr-service:latest
    container_name: ocr-service
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - comptabli-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME}/comptabli-backend:latest
    container_name: backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:admin@postgres:5432/Comptabli?schema=public}
      OCR_SERVICE_URL: http://ocr-service:8000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost,http://10.0.2.15}
    ports:
      - "3000:3000"
    networks:
      - comptabli-network
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/comptabli-frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - comptabli-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  comptabli-network:
    driver: bridge

volumes:
  postgres_data:
