services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-Comptabli}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - comptabli-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-Comptabli}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ocr-service:
    image: ${DOCKERHUB_USERNAME}/comptabli-ocr-service:latest
    container_name: ocr-service
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - comptabli-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME}/comptabli-backend:latest
    container_name: backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:admin@postgres:5432/Comptabli?schema=public}
      OCR_SERVICE_URL: http://ocr-service:8000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://comptabli.tn}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM:-"Comptabli <noreply@comptabli.tn>"}
    ports:
      - "3000:3000"
    networks:
      - comptabli-network
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/comptabli-frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - comptabli-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
  # ==========================================
  # STACK OBSERVABILITÉ & MONITORING
  # ==========================================

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - comptabli-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change_me_monitoring}
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - comptabli-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - comptabli-network
    restart: unless-stopped

networks:
  comptabli-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
