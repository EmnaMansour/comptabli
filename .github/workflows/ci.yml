name: Comptabli CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # 1. FRONTEND JOB
  # ==========================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # Permet de ne pas bloquer si quelques warnings ESLint existent

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  # ==========================================
  # 2. BACKEND JOB
  # ==========================================
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    # Service de base de données temporaire pour les tests E2E / Prisma
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comptabli
          POSTGRES_PASSWORD: comptabli_pass
          POSTGRES_DB: comptabli_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Injection de variables factices pour l'exécution des tests (Jamais de .env sur GitHub)
      DATABASE_URL: postgresql://comptabli:comptabli_pass@localhost:5432/comptabli_db?schema=public
      JWT_SECRET: super_secret_test_jwt
      OCR_SERVICE_URL: http://localhost:8000
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma DB Push (Sync Schema)
        run: npx prisma db push --accept-data-loss
        # Force la synchro du schema avec la base temporaire

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm run test

  # ==========================================
  # 3. OCR SERVICE JOB
  # ==========================================
  ocr-ci:
    name: OCR Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ocr-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (Tesseract)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra poppler-utils libgl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Tests
        run: python3 -m unittest discover -s . -p "test_*.py"
        continue-on-error: true
