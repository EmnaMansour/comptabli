name: Deploy to VM

# Se déclenche uniquement APRÈS que Docker Build & Push ait réussi
on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types:
      - completed
    branches: [main, master]

jobs:
  deploy:
    name: Deploy on Self-Hosted VM
    # Tourne DIRECTEMENT sur votre VM Ubuntu (le runner qu'on vient d'installer)
    runs-on: self-hosted

    # Ne se déploie QUE si le pipeline Docker a réussi (pas en cas d'échec)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Récupère le code (pour avoir le docker-compose.yml à jour)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Se connecte à Docker Hub pour pouvoir télécharger les images privées
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 3. Télécharge les dernières images construites par le pipeline CI/CD
      - name: Pull latest Docker images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-frontend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-ocr-service:latest

      # 4. Arrête les anciens conteneurs proprement
      - name: Stop existing containers
        run: docker compose -f docker-compose.prod.yml down --remove-orphans
        continue-on-error: true

      # 5. Démarre tous les services avec la nouvelle version (images Docker Hub)
      - name: Start all services
        run: docker compose -f docker-compose.prod.yml up -d
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production

      # 6. Vérifie que les conteneurs sont bien démarrés
      - name: Verify deployment
        run: |
          echo "=== Conteneurs en cours d'exécution ==="
          docker ps
          echo "=== Déploiement réussi ! ==="
