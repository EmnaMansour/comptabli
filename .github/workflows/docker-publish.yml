name: Docker Build & Push

# Se déclenche UNIQUEMENT sur un push sur la branche main/master
# et APRÈS que les jobs de tests (CI) ont réussi
on:
  push:
    branches: [ "main", "master" ]

# Permission de lire le code
permissions:
  contents: read

jobs:
  # ==========================================
  # 1. BUILD & PUSH - BACKEND
  # ==========================================
  docker-backend:
    name: 🐳 Build & Push Backend
    runs-on: ubuntu-latest
    # Ne se lance QUE si les tests CI ont réussi
    needs: []  # Retirez [] et remplacez par [backend-ci] si vous fusionnez les deux fichiers

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # Connexion à Docker Hub en utilisant les secrets GitHub
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Active BuildKit pour des builds plus rapides et avec cache
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Génère les tags automatiquement (latest + SHA du commit)
      - name: 🏷️ Extract Docker metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: 🔨 Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          # Cache entre les runs GitHub Actions pour accélérer les builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 2. BUILD & PUSH - FRONTEND
  # ==========================================
  docker-frontend:
    name: 🐳 Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Docker metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: 🔨 Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 3. BUILD & PUSH - OCR SERVICE (Python)
  # ==========================================
  docker-ocr:
    name: 🐳 Build & Push OCR Service
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract Docker metadata
        id: meta-ocr
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-ocr-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: 🔨 Build & Push OCR Service image
        uses: docker/build-push-action@v5
        with:
          context: ./ocr-service
          push: true
          tags: ${{ steps.meta-ocr.outputs.tags }}
          labels: ${{ steps.meta-ocr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
