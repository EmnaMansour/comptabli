name: Comptabli Full CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  # ==========================================
  # STAGE 1 : CONTINUOUS INTEGRATION (CI)
  # ==========================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comptabli
          POSTGRES_PASSWORD: comptabli_pass
          POSTGRES_DB: comptabli_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://comptabli:comptabli_pass@localhost:5432/comptabli_db?schema=public
      JWT_SECRET: super_secret_test_jwt
      OCR_SERVICE_URL: http://localhost:8000
      NODE_ENV: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run Prisma DB Push (Sync Schema)
        run: npx prisma db push --accept-data-loss
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Unit Tests
        run: npm run test

  ocr-ci:
    name: OCR Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ocr-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install system dependencies (Tesseract)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-fra poppler-utils libgl1
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Python Tests
        run: python3 -m unittest discover -s . -p "test_*.py"
        continue-on-error: true

  # ==========================================
  # STAGE 2 : DOCKER BUILD & PUSH (Docker Hub)
  # ==========================================
  docker-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [frontend-ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract Docker metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [backend-ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract Docker metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-ocr:
    name: Build & Push OCR Service
    runs-on: ubuntu-latest
    needs: [ocr-ci]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract Docker metadata
        id: meta-ocr
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-ocr-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
      - name: Build & Push OCR Service image
        uses: docker/build-push-action@v5
        with:
          context: ./ocr-service
          push: true
          tags: ${{ steps.meta-ocr.outputs.tags }}
          labels: ${{ steps.meta-ocr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # STAGE 3 : DEPLOY TO VM (CD)
  # ==========================================
  deploy-vm:
    name: Continuous Deployment (CD)
    runs-on: self-hosted
    needs: [docker-frontend, docker-backend, docker-ocr]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Pull latest Docker images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-frontend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/comptabli-ocr-service:latest
      - name: Stop existing containers
        run: docker compose -f docker-compose.prod.yml down --remove-orphans
        continue-on-error: true
      - name: Start all services
        run: docker compose -f docker-compose.prod.yml up -d
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
      - name: Verify deployment
        run: |
          echo "=== Conteneurs en cours d'exécution ==="
          docker ps
          echo "=== Déploiement réussi ! ==="
