server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Routage Frontend SPA (React/Vue/Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le Backend NestJS
    location /api/ {
        # proxy_pass attend la fin du slash pour reecrire l'URL si besoin,
        # mais on redirige tel quel vers le backend.
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy vers le Microservice OCR (si le frontend l'appelle directement, ce qui est rare, mais demandé dans les spécifications)
    location /ocr/ {
        proxy_pass http://ocr-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache Control pour les assets statiques
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
